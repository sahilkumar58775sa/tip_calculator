<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f23;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            color: #64ffda;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.3);
        }

        .header p {
            color: #888;
            font-size: 1rem;
        }

        .input-section {
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0.8rem;
            font-size: 1rem;
            color: #64ffda;
            font-weight: 600;
        }

        .input-group label .icon {
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }

        .input-field {
            position: relative;
        }

        .input-field input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #ffffff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field input:focus {
            border-color: #64ffda;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.2);
            background: rgba(255, 255, 255, 0.12);
        }

        .input-field .currency {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
            font-size: 1.1rem;
        }

        .input-field input.with-currency {
            padding-left: 2.5rem;
        }

        .tip-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .tip-btn {
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tip-btn:hover {
            background: rgba(100, 255, 218, 0.1);
            border-color: #64ffda;
            transform: translateY(-2px);
        }

        .tip-btn.active {
            background: #64ffda;
            color: #0f0f23;
            border-color: #64ffda;
            box-shadow: 0 5px 15px rgba(100, 255, 218, 0.3);
        }

        .people-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .people-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .people-btn:hover {
            background: #64ffda;
            color: #0f0f23;
            transform: scale(1.1);
        }

        .people-count {
            font-size: 1.5rem;
            font-weight: bold;
            color: #64ffda;
            min-width: 60px;
            text-align: center;
        }

        .results {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-label {
            display: flex;
            align-items: center;
            color: #888;
            font-size: 1rem;
        }

        .result-label .icon {
            margin-right: 0.5rem;
            font-size: 1.1rem;
        }

        .result-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffffff;
        }

        .result-value.highlight {
            color: #64ffda;
            font-size: 1.5rem;
        }

        .custom-tip {
            margin-top: 1rem;
        }

        .custom-tip input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .custom-tip input:focus {
            border-color: #64ffda;
            box-shadow: 0 0 10px rgba(100, 255, 218, 0.2);
        }

        .reset-btn {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
                margin: 10px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .tip-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .people-selector {
                padding: 0.8rem;
            }
            
            .people-btn {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Tip Calculator</h1>
            <p>Calculate tips and split bills easily</p>
        </div>

        <div class="input-section">
            <!-- Bill Amount -->
            <div class="input-group">
                <label>
                    <span class="icon">🧾</span>
                    Bill Amount
                </label>
                <div class="input-field">
                    <span class="currency">₹</span>
                    <input type="number" id="billAmount" class="with-currency" placeholder="0.00" step="0.01" min="0">
                </div>
            </div>

            <!-- Tip Percentage -->
            <div class="input-group">
                <label>
                    <span class="icon">💡</span>
                    Select Tip %
                </label>
                <div class="tip-buttons">
                    <button class="tip-btn" data-tip="10">10%</button>
                    <button class="tip-btn" data-tip="15">15%</button>
                    <button class="tip-btn" data-tip="18">18%</button>
                    <button class="tip-btn" data-tip="20">20%</button>
                    <button class="tip-btn" data-tip="25">25%</button>
                    <button class="tip-btn" data-tip="30">30%</button>
                </div>
                <div class="custom-tip">
                    <input type="number" id="customTip" placeholder="Custom tip %" min="0" max="100">
                </div>
            </div>

            <!-- Number of People -->
            <div class="input-group">
                <label>
                    <span class="icon">👥</span>
                    Number of People
                </label>
                <div class="people-selector">
                    <button class="people-btn" id="decreasePeople">−</button>
                    <span class="people-count" id="peopleCount">1</span>
                    <button class="people-btn" id="increasePeople">+</button>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="results">
            <div class="result-row">
                <div class="result-label">
                    <span class="icon">+</span>
                    Tip Amount
                </div>
                <div class="result-value" id="tipAmount">₹0.00</div>
            </div>
            
            <div class="result-row">
                <div class="result-label">
                    <span class="icon">=</span>
                    Total Amount
                </div>
                <div class="result-value highlight" id="totalAmount">₹0.00</div>
            </div>
            
            <div class="result-row">
                <div class="result-label">
                    <span class="icon">÷</span>
                    Per Person
                </div>
                <div class="result-value" id="perPersonAmount">₹0.00</div>
            </div>
            
            <div class="result-row">
                <div class="result-label">
                    <span class="icon">•</span>
                    Tip Per Person
                </div>
                <div class="result-value" id="tipPerPerson">₹0.00</div>
            </div>
        </div>

        <button class="reset-btn" id="resetBtn">↻ Reset All</button>
    </div>

    <script>
        // Get all the elements we need
        let billAmountInput = document.getElementById('billAmount');
        let customTipInput = document.getElementById('customTip');
        let peopleCount = document.getElementById('peopleCount');
        let decreasePeopleBtn = document.getElementById('decreasePeople');
        let increasePeopleBtn = document.getElementById('increasePeople');
        let resetBtn = document.getElementById('resetBtn');
        
        // Result elements
        let tipAmountDisplay = document.getElementById('tipAmount');
        let totalAmountDisplay = document.getElementById('totalAmount');
        let perPersonAmountDisplay = document.getElementById('perPersonAmount');
        let tipPerPersonDisplay = document.getElementById('tipPerPerson');
        
        // Tip buttons
        let tipButtons = document.querySelectorAll('.tip-btn');
        
        // Variables to store values
        let billAmount = 0;
        let tipPercentage = 15; // Default 15%
        let numberOfPeople = 1;
        
        // Function to format currency
        function formatCurrency(amount) {
            return '₹' + amount.toFixed(2);
        }
        
        // Function to calculate tip and totals
        function calculateTip() {
            // Get bill amount
            billAmount = parseFloat(billAmountInput.value) || 0;
            
            // Calculate tip amount
            let tipAmount = (billAmount * tipPercentage) / 100;
            
            // Calculate total amount
            let totalAmount = billAmount + tipAmount;
            
            // Calculate per person amounts
            let perPersonAmount = totalAmount / numberOfPeople;
            let tipPerPerson = tipAmount / numberOfPeople;
            
            // Update display
            tipAmountDisplay.textContent = formatCurrency(tipAmount);
            totalAmountDisplay.textContent = formatCurrency(totalAmount);
            perPersonAmountDisplay.textContent = formatCurrency(perPersonAmount);
            tipPerPersonDisplay.textContent = formatCurrency(tipPerPerson);
        }
        
        // Function to set active tip button
        function setActiveTipButton(percentage) {
            // Remove active class from all buttons
            tipButtons.forEach(function(button) {
                button.classList.remove('active');
            });
            
            // Add active class to selected button
            tipButtons.forEach(function(button) {
                if (parseInt(button.dataset.tip) === percentage) {
                    button.classList.add('active');
                }
            });
        }
        
        // Function to update people count
        function updatePeopleCount(change) {
            numberOfPeople += change;
            
            // Make sure we don't go below 1
            if (numberOfPeople < 1) {
                numberOfPeople = 1;
            }
            
            // Update display
            peopleCount.textContent = numberOfPeople;
            
            // Recalculate
            calculateTip();
        }
        
        // Function to reset everything
        function resetAll() {
            billAmount = 0;
            tipPercentage = 15;
            numberOfPeople = 1;
            
            // Reset inputs
            billAmountInput.value = '';
            customTipInput.value = '';
            peopleCount.textContent = '1';
            
            // Reset tip buttons
            setActiveTipButton(15);
            
            // Recalculate (will show zeros)
            calculateTip();
        }
        
        // Add event listeners when page loads
        window.onload = function() {
            // Bill amount input
            billAmountInput.addEventListener('input', calculateTip);
            
            // Tip percentage buttons
            tipButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    tipPercentage = parseInt(this.dataset.tip);
                    setActiveTipButton(tipPercentage);
                    customTipInput.value = ''; // Clear custom tip
                    calculateTip();
                });
            });
            
            // Custom tip input
            customTipInput.addEventListener('input', function() {
                let customTip = parseFloat(this.value) || 0;
                if (customTip >= 0) {
                    tipPercentage = customTip;
                    // Remove active state from preset buttons
                    tipButtons.forEach(function(button) {
                        button.classList.remove('active');
                    });
                    calculateTip();
                }
            });
            
            // People counter buttons
            decreasePeopleBtn.addEventListener('click', function() {
                updatePeopleCount(-1);
            });
            
            increasePeopleBtn.addEventListener('click', function() {
                updatePeopleCount(1);
            });
            
            // Reset button
            resetBtn.addEventListener('click', resetAll);
            
            // Initialize with default values
            setActiveTipButton(15);
            calculateTip();
            
            // Focus on bill amount input
            billAmountInput.focus();
        };
        
        // Add some nice input effects
        function addInputEffects() {
            let inputs = document.querySelectorAll('input');
            
            inputs.forEach(function(input) {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0px)';
                });
            });
        }
        
        // Initialize input effects when page loads
        window.addEventListener('load', addInputEffects);
    </script>
</body>
</html>
